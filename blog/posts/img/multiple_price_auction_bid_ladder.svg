<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Competitive bids sorted from highest price to lowest. The Treasury fills bids from the top down until the target amount is sold; the lowest accepted price is the stop price. Bids above are filled in full, the marginal bid is pro-rated, bids below are rejected.</desc>
